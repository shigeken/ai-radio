<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #666680;
    --glow: rgba(255, 77, 109, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .station-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span {
    color: var(--accent);
  }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  /* API Key input */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus {
    border-color: var(--accent2);
  }

  input[type="password"] {
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
  }

  textarea {
    resize: none;
    height: 80px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 20px;
  }

  /* Theme chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .chip {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    transition: all 0.2s;
  }

  .chip:hover, .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    letter-spacing: 1px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover:not(:disabled) {
    background: #ff2d52;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255, 77, 109, 0.4);
  }

  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Output card */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 480px;
    display: none;
  }

  .output-card.visible {
    display: block;
  }

  /* Waveform animation */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    margin-bottom: 16px;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: wave 1s ease-in-out infinite;
    opacity: 0.3;
  }

  .bar.playing { opacity: 1; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 24px; }
  }

  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.4s; }
  .bar:nth-child(6) { animation-delay: 0.3s; }
  .bar:nth-child(7) { animation-delay: 0.2s; }
  .bar:nth-child(8) { animation-delay: 0.1s; }
  .bar:nth-child(9) { animation-delay: 0s; }

  .script-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
  }

  .btn-play {
    flex: 1;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    transition: all 0.2s;
  }

  .btn-play:hover {
    opacity: 0.85;
  }

  .btn-stop {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    transition: all 0.2s;
  }

  .btn-stop:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Status */
  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 1px;
    min-height: 16px;
  }

  .status.error {
    color: var(--accent);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* Loading dots */
  .loading::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">テーマを入れるだけ、AIがしゃべる</div>
</div>

<!-- Input Card -->
<div class="card">
  <div class="form-group">
    <div class="section-label">🔑 API キー</div>
    <input type="password" id="apiKey" placeholder="sk-ant-api..." autocomplete="off">
  </div>

  <hr class="divider">

  <div class="form-group">
    <div class="section-label">🎙️ テーマ</div>
    <textarea id="theme" placeholder="例：今日の天気、最新のAIニュース、朝の一言メッセージ..."></textarea>
    <div class="chips">
      <button class="chip" onclick="setTheme('朝のモーニングトーク')">☀️ 朝のトーク</button>
      <button class="chip" onclick="setTheme('最新のAIニュース')">🤖 AIニュース</button>
      <button class="chip" onclick="setTheme('今日の豆知識')">💡 豆知識</button>
      <button class="chip" onclick="setTheme('癒しの夜のラジオ')">🌙 夜のラジオ</button>
      <button class="chip" onclick="setTheme('週末のおすすめの過ごし方')">🎉 週末</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">
    🎙️ 放送開始
  </button>
  <div class="status" id="status"></div>
</div>

<!-- Output Card -->
<div class="output-card" id="outputCard">
  <div class="section-label">📡 オンエア中</div>
  <div class="waveform" id="waveform">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <div class="script-text" id="scriptText"></div>
  <div class="controls">
    <button class="btn-play" id="playBtn" onclick="togglePlay()">▶ 読み上げる</button>
    <button class="btn-stop" onclick="stop()">■ 停止</button>
  </div>
</div>

<script>
let currentScript = '';
let synth = window.speechSynthesis;
let utterance = null;
let isPlaying = false;

function setTheme(text) {
  document.getElementById('theme').value = text;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const theme = document.getElementById('theme').value.trim();

  if (!apiKey) {
    setStatus('APIキーを入力してください', true);
    return;
  }
  if (!theme) {
    setStatus('テーマを入力してください', true);
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '台本を生成中';
  btn.classList.add('loading');
  setStatus('AIが台本を書いています...', false);

  stop();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `あなたはプロのラジオDJです。以下のテーマで、自然で聴きやすいラジオトークの台本を日本語で書いてください。
          
テーマ：${theme}

【条件】
- 1〜2分程度で読める長さ（300〜400文字）
- 親しみやすく、テンポよく
- 挨拶から始めてテーマについて話し、最後に締めの一言
- 記号や箇条書きは使わず、そのまま読めるテキストのみ
- 「皆さん」「みなさん」などで呼びかけながら話す

台本のみ出力してください。`
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'APIエラー');
    }

    const data = await response.json();
    currentScript = data.content[0].text;

    document.getElementById('scriptText').textContent = currentScript;
    document.getElementById('outputCard').classList.add('visible');
    setStatus('台本が完成しました！▶で読み上げられます', false);

  } catch (e) {
    setStatus('エラー: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '🎙️ 放送開始';
    btn.classList.remove('loading');
  }
}

function togglePlay() {
  if (isPlaying) {
    synth.pause();
    setPlaying(false);
  } else if (synth.paused) {
    synth.resume();
    setPlaying(true);
  } else {
    speak();
  }
}

function speak() {
  stop();
  utterance = new SpeechSynthesisUtterance(currentScript);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.95;
  utterance.pitch = 1.05;

  // 日本語の声を優先
  const voices = synth.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) utterance.voice = jaVoice;

  utterance.onstart = () => setPlaying(true);
  utterance.onend = () => setPlaying(false);
  utterance.onerror = () => setPlaying(false);

  synth.speak(utterance);
}

function stop() {
  synth.cancel();
  setPlaying(false);
}

function setPlaying(playing) {
  isPlaying = playing;
  const btn = document.getElementById('playBtn');
  const bars = document.querySelectorAll('.bar');
  if (playing) {
    btn.textContent = '⏸ 一時停止';
    bars.forEach(b => b.classList.add('playing'));
  } else {
    btn.textContent = '▶ 読み上げる';
    bars.forEach(b => b.classList.remove('playing'));
  }
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

// 音声リスト読み込み
if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => {};
}
</script>
</body>
</html>
