<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #666680;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  .header { text-align: center; margin-bottom: 28px; }

  .station-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 { font-size: clamp(32px, 8vw, 52px); font-weight: 900; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus { border-color: var(--accent2); }
  input[type="password"] { font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }

  .key-saved {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(123,97,255,0.1);
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent2);
  }

  .key-saved button {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    text-decoration: underline;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  /* メインボタン */
  .btn-main {
    width: 100%;
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px;
    font-weight: 900;
    padding: 20px;
    letter-spacing: 2px;
    transition: all 0.2s;
    background: var(--accent);
  }

  .btn-main:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,77,109,0.5);
  }

  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-stop {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    margin-top: 10px;
    transition: all 0.2s;
  }

  .btn-stop:hover { border-color: var(--accent); color: var(--accent); }

  /* ステータス表示 */
  .now-playing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
    display: none;
  }

  .now-playing.visible { display: block; }

  /* 波形 */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    margin-bottom: 16px;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
    opacity: 0.3;
  }

  .bar.talk { background: var(--accent); }
  .bar.cm { background: #ffd700; }
  .bar.music { background: var(--accent2); }
  .bar.active { opacity: 1; }

  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 24px; }
  }

  .bar:nth-child(1){animation-delay:0s}
  .bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}
  .bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}
  .bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}
  .bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}

  /* モード表示 */
  .mode-badge {
    display: inline-block;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .mode-talk { background: rgba(255,77,109,0.2); color: var(--accent); }
  .mode-cm { background: rgba(255,215,0,0.2); color: #ffd700; }
  .mode-loading { background: rgba(123,97,255,0.2); color: var(--accent2); }

  /* テーマ表示 */
  .current-theme {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* 会話ログ */
  .chat-log {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
    max-height: 350px;
    overflow-y: auto;
  }

  .chat-bubble {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .chat-bubble.right { flex-direction: row-reverse; }

  .bubble-avatar { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }

  .bubble-content { max-width: 82%; }

  .bubble-name {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .chat-bubble.left .bubble-name { color: var(--accent); }
  .chat-bubble.right .bubble-name { color: var(--accent2); text-align: right; }

  .bubble-text {
    background: var(--bg);
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    padding: 10px 13px;
    border: 1px solid var(--border);
  }

  .chat-bubble.left .bubble-text { border-color: rgba(255,77,109,0.3); border-top-left-radius: 3px; }
  .chat-bubble.right .bubble-text { border-color: rgba(123,97,255,0.3); border-top-right-radius: 3px; }
  .bubble-text.speaking { background: rgba(255,255,255,0.06); }

  /* CM表示 */
  .cm-box {
    background: rgba(255,215,0,0.07);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 16px;
    display: none;
    color: #ffe566;
  }

  .cm-box.visible { display: block; }

  /* BGMインジケーター */
  .bgm-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
  }

  .bgm-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    min-height: 16px;
  }

  .status.error { color: var(--accent); }

  .loading-text::after {
    content: '';
    animation: dots 1.2s steps(4,end) infinite;
  }

  @keyframes dots {
    0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}
  }
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">エンドレスラジオ — 止まるまで流れ続ける</div>
</div>

<!-- 設定カード -->
<div class="card" id="setupCard">
  <div id="apiKeyGroup">
    <div class="section-label">🔑 API キー</div>
    <div id="keySavedBanner" class="key-saved" style="display:none">
      <span>✅ APIキー保存済み</span>
      <button onclick="clearKey()">削除して再入力</button>
    </div>
    <div id="keyInputArea">
      <input type="password" id="apiKey" placeholder="sk-ant-api..." autocomplete="off">
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
        <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
        <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
      </div>
    </div>
  </div>

  <hr class="divider">

  <button class="btn-main" id="startBtn" onclick="startRadio()">
    ▶ 放送開始
  </button>
  <div class="status" id="status"></div>
</div>

<!-- 放送中カード -->
<div class="now-playing" id="nowPlaying">
  <div class="section-label">📡 オンエア中</div>

  <div class="waveform">
    <div class="bar talk" id="b1"></div>
    <div class="bar talk" id="b2"></div>
    <div class="bar talk" id="b3"></div>
    <div class="bar talk" id="b4"></div>
    <div class="bar talk" id="b5"></div>
    <div class="bar talk" id="b6"></div>
    <div class="bar talk" id="b7"></div>
    <div class="bar talk" id="b8"></div>
    <div class="bar talk" id="b9"></div>
  </div>

  <div class="mode-badge mode-talk" id="modeBadge">🎙️ トーク中</div>
  <div class="current-theme" id="currentTheme"></div>

  <div class="chat-log" id="chatLog"></div>
  <div class="cm-box" id="cmBox"></div>

  <div class="bgm-bar">
    <div class="bgm-dot"></div>
    <span>BGM 再生中</span>
  </div>

  <button class="btn-stop" onclick="stopRadio()">■ 放送終了</button>
</div>

<script>
// ===== DJキャラ =====
const DJS = {
  a: { name: 'ハル', emoji: '😄', pitch: 1.2, rate: 1.05 },
  b: { name: 'ソラ', emoji: '🤓', pitch: 0.85, rate: 0.95 }
};

// ===== ランダムテーマリスト =====
const THEMES = [
  '最近のAIブームについて',
  '週末のおすすめの過ごし方',
  '今日の面白い豆知識',
  '日本の食文化について',
  '宇宙の不思議',
  '健康的な生活習慣',
  'スマホの便利な使い方',
  '旅行に行きたい場所',
  '最近話題のエンタメ',
  '季節の変わり目の過ごし方',
  'お金の賢い使い方',
  '友達との思い出話',
  '好きな音楽の話',
  '将来の夢や目標',
  'ペットと暮らす楽しさ',
  '日本語の面白い表現',
  '朝型と夜型どちらが得か',
  'SNSとの上手な付き合い方',
  '読書のすすめ',
  '料理を始めるきっかけ'
];

let isRunning = false;
let synth = window.speechSynthesis;
let voices = [];
let audioCtx = null;
let bgmNodes = [];
let nextScript = null;
let nextCm = null;

// ===== 音声 =====
function loadVoices() {
  voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

// ===== APIキー管理 =====
function loadKey() {
  try {
    const saved = localStorage.getItem('ai_radio_key');
    if (saved) {
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
}

function clearKey() {
  try { localStorage.removeItem('ai_radio_key'); } catch(e) {}
  document.getElementById('keySavedBanner').style.display = 'none';
  document.getElementById('keyInputArea').style.display = 'block';
  document.getElementById('apiKey').value = '';
}

function getApiKey() {
  try {
    const saved = localStorage.getItem('ai_radio_key');
    if (saved) return saved;
  } catch(e) {}
  return document.getElementById('apiKey').value.trim();
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

// ===== BGM（Web Audio APIで生成）=====
function startBGM() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playBGMLoop();
  } catch(e) { console.log('BGM error:', e); }
}

function playBGMLoop() {
  if (!isRunning || !audioCtx) return;

  // シンプルなアンビエントBGM
  const notes = [261.6, 293.6, 329.6, 349.2, 392.0, 440.0, 493.8];
  const now = audioCtx.currentTime;

  for (let i = 0; i < 8; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const note = notes[Math.floor(Math.random() * notes.length)];
    osc.frequency.value = note * (Math.random() > 0.5 ? 1 : 0.5);
    osc.type = 'sine';

    const start = now + i * 0.8;
    const dur = 1.5;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.04, start + 0.3);
    gain.gain.linearRampToValueAtTime(0, start + dur);

    osc.start(start);
    osc.stop(start + dur);
    bgmNodes.push(osc);
  }

  setTimeout(() => {
    if (isRunning) playBGMLoop();
  }, 6000);
}

function stopBGM() {
  bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
  bgmNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ===== AI台本生成 =====
async function fetchScript(theme) {
  const apiKey = getApiKey();
  const prompt = `あなたはラジオ番組の台本作家です。
2人のDJが会話するラジオ番組の台本を作ってください。

DJ A「${DJS.a.name}」: 明るくテンション高め。話を広げるのが得意。
DJ B「${DJS.b.name}」: 冷静で知識豊富。ツッコミ担当。

テーマ：${theme}

【ルール】
- 全部で8〜10回のやり取り
- 各セリフは1〜2文
- 挨拶から始まりテーマで盛り上がり締めで終わる

【出力形式】この形式のみ：
A:セリフ
B:セリフ
A:セリフ
...

余計な説明不要。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('API error');
  const data = await res.json();
  const raw = data.content[0].text;

  const lines = [];
  raw.split('\n').forEach(line => {
    const t = line.trim();
    if (t.startsWith('A:')) lines.push({ dj: 'a', text: t.slice(2).trim() });
    else if (t.startsWith('B:')) lines.push({ dj: 'b', text: t.slice(2).trim() });
  });

  return { theme, lines };
}

// ===== CM生成 =====
async function fetchCM() {
  const apiKey = getApiKey();
  const cmTypes = ['食品', 'アプリ', '旅行', '健康食品', '家電', '本', 'カフェ', 'スポーツジム'];
  const type = cmTypes[Math.floor(Math.random() * cmTypes.length)];

  const prompt = `架空の${type}のラジオCMを日本語で作ってください。
商品名は架空のもので。ナレーター1人が読む形式で20〜30秒分（100文字程度）。
CMの文章のみ出力してください。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('CM API error');
  const data = await res.json();
  return data.content[0].text.trim();
}

// ===== 読み上げ =====
function speak(text, djKey) {
  return new Promise(resolve => {
    synth.cancel();
    const dj = DJS[djKey] || { pitch: 1, rate: 1 };
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    utter.pitch = dj.pitch;
    utter.rate = dj.rate;
    if (voices.length > 0) utter.voice = voices[0];
    utter.onend = resolve;
    utter.onerror = resolve;
    synth.speak(utter);
  });
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ===== チャット描画 =====
function renderChat(lines) {
  const log = document.getElementById('chatLog');
  log.innerHTML = '';
  lines.forEach((line, i) => {
    const dj = DJS[line.dj];
    const side = line.dj === 'a' ? 'left' : 'right';
    const div = document.createElement('div');
    div.className = `chat-bubble ${side}`;
    div.innerHTML = `
      <div class="bubble-avatar">${dj.emoji}</div>
      <div class="bubble-content">
        <div class="bubble-name">${dj.name}</div>
        <div class="bubble-text" id="line-${i}">${line.text}</div>
      </div>`;
    log.appendChild(div);
  });
}

function highlight(idx) {
  document.querySelectorAll('.bubble-text').forEach(el => el.classList.remove('speaking'));
  const el = document.getElementById(`line-${idx}`);
  if (el) {
    el.classList.add('speaking');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function setMode(mode, theme) {
  const badge = document.getElementById('modeBadge');
  const bars = document.querySelectorAll('.bar');

  bars.forEach(b => {
    b.classList.remove('talk', 'cm', 'music', 'active');
  });

  if (mode === 'talk') {
    badge.textContent = '🎙️ トーク中';
    badge.className = 'mode-badge mode-talk';
    bars.forEach(b => { b.classList.add('talk', 'active'); });
    document.getElementById('currentTheme').textContent = `📌 ${theme}`;
    document.getElementById('cmBox').classList.remove('visible');
    document.getElementById('chatLog').style.display = 'flex';
  } else if (mode === 'cm') {
    badge.textContent = '📺 CM中';
    badge.className = 'mode-badge mode-cm';
    bars.forEach(b => { b.classList.add('cm', 'active'); });
    document.getElementById('currentTheme').textContent = '次の話題を準備中...';
    document.getElementById('chatLog').style.display = 'none';
    document.getElementById('cmBox').classList.add('visible');
  } else if (mode === 'loading') {
    badge.textContent = '⏳ 準備中';
    badge.className = 'mode-badge mode-loading';
  }
}

// ===== メインループ =====
async function radioLoop() {
  // 最初の台本取得
  setMode('loading', '');
  setStatus('最初の台本を準備中...', false);

  const randomTheme = () => THEMES[Math.floor(Math.random() * THEMES.length)];

  let current = await fetchScript(randomTheme());

  while (isRunning) {
    // --- トークパート ---
    setMode('talk', current.theme);
    renderChat(current.lines);

    // 裏でCMと次の台本を並行取得
    const [cmText, nextScriptData] = await Promise.all([
      fetchCM(),
      fetchScript(randomTheme())
    ]);

    // 会話を順番に読み上げ
    for (let i = 0; i < current.lines.length; i++) {
      if (!isRunning) return;
      highlight(i);
      await speak(current.lines[i].text, current.lines[i].dj);
      await wait(250);
    }

    if (!isRunning) return;

    // --- CMパート ---
    setMode('cm', '');
    document.getElementById('cmBox').textContent = cmText;

    await speak('それではCMです。', 'a');
    await wait(200);
    await speak(cmText, null);
    await wait(500);
    await speak('以上、CMでした！それでは放送に戻ります。', 'b');
    await wait(500);

    if (!isRunning) return;

    current = nextScriptData;
  }
}

// ===== 開始・終了 =====
async function startRadio() {
  const apiKey = getApiKey();
  if (!apiKey) { setStatus('APIキーを入力してください', true); return; }

  // APIキー保存
  try {
    if (document.getElementById('saveKey')?.checked) {
      localStorage.setItem('ai_radio_key', apiKey);
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}

  isRunning = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('nowPlaying').classList.add('visible');

  startBGM();
  await radioLoop();
}

function stopRadio() {
  isRunning = false;
  synth.cancel();
  stopBGM();
  document.getElementById('nowPlaying').classList.remove('visible');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('chatLog').style.display = 'flex';
