<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ラジオ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#13131a;--border:#2a2a3a;
    --accent:#ff4d6d;--accent2:#7b61ff;--text:#e8e8f0;--muted:#666680;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
  .header{text-align:center;margin-bottom:28px}
  .station-label{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;
    color:var(--accent);text-transform:uppercase;margin-bottom:8px}
  h1{font-size:clamp(32px,8vw,52px);font-weight:900;letter-spacing:-1px}
  h1 span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:13px;margin-top:6px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:24px 20px;width:100%;max-width:480px;margin-bottom:16px}
  .section-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
    color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  input[type="password"],textarea{width:100%;background:var(--bg);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;
    padding:12px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
  input[type="password"]:focus,textarea:focus{border-color:var(--accent2)}
  input[type="password"]{font-family:'Share Tech Mono',monospace;letter-spacing:2px}
  textarea{resize:none;height:80px;line-height:1.6}
  .key-saved{display:flex;align-items:center;justify-content:space-between;
    background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.3);
    border-radius:10px;padding:10px 14px;font-size:13px;color:var(--accent2)}
  .key-saved button{background:transparent;border:none;color:var(--muted);
    cursor:pointer;font-size:12px;text-decoration:underline}
  .divider{border:none;border-top:1px solid var(--border);margin:18px 0}
  .btn-main{width:100%;border:none;border-radius:14px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:18px;font-weight:900;
    padding:20px;letter-spacing:2px;transition:all .2s;background:var(--accent)}
  .btn-main:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,77,109,.5)}
  .btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-stop{width:100%;background:transparent;border:1px solid var(--border);
    border-radius:14px;color:var(--muted);cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;
    padding:14px;margin-top:10px;transition:all .2s}
  .btn-stop:hover{border-color:var(--accent);color:var(--accent)}
  .now-playing{background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:24px 20px;width:100%;max-width:480px;
    margin-bottom:16px;display:none}
  .now-playing.visible{display:block}
  .waveform{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:16px}
  .bar{width:3px;border-radius:2px;animation:wave 1s ease-in-out infinite;opacity:.3}
  .bar.active{opacity:1;background:var(--accent)}
  .bar.cm{background:#ffd700}
  @keyframes wave{0%,100%{height:4px}50%{height:24px}}
  .bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.1s}
  .bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}
  .bar:nth-child(5){animation-delay:.4s}.bar:nth-child(6){animation-delay:.3s}
  .bar:nth-child(7){animation-delay:.2s}.bar:nth-child(8){animation-delay:.1s}
  .bar:nth-child(9){animation-delay:0s}
  .mode-badge{display:inline-block;border-radius:20px;font-size:12px;font-weight:700;
    padding:4px 12px;margin-bottom:12px;letter-spacing:1px}
  .mode-talk{background:rgba(255,77,109,.2);color:var(--accent)}
  .mode-cm{background:rgba(255,215,0,.2);color:#ffd700}
  .mode-loading{background:rgba(123,97,255,.2);color:var(--accent2)}
  .current-theme{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
  .loading-indicator{display:none;align-items:center;justify-content:center;gap:10px;
    margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent2)}
  .loading-indicator.visible{display:flex}
  .loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent2);
    display:inline-block;margin:0 3px;animation:dotpulse 1.2s ease-in-out infinite;opacity:.3}
  .loading-dots span:nth-child(2){animation-delay:.4s}
  .loading-dots span:nth-child(3){animation-delay:.8s}
  @keyframes dotpulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
  .timer-box{display:none;background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.3);
    border-radius:10px;padding:10px 14px;margin-bottom:12px;
    font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);text-align:center}
  .timer-box.visible{display:block}
  .letter-box{background:rgba(123,97,255,.07);border:1px solid rgba(123,97,255,.3);
    border-radius:14px;padding:16px;margin-bottom:16px;display:none}
  .letter-box.visible{display:block}
  .letter-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:10px;
    font-family:'Share Tech Mono',monospace;letter-spacing:2px}
  .next-theme-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;
    padding:10px 12px;background:rgba(123,97,255,.1);border-radius:8px}
  .letter-sent{text-align:center;color:var(--accent2);font-size:13px;padding:8px 0;display:none}
  .btn-send{width:100%;border:none;border-radius:10px;color:#fff;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;
    padding:12px;margin-top:8px;transition:all .2s;background:var(--accent2)}
  .btn-send:hover:not(:disabled){opacity:.85}
  .btn-send:disabled{opacity:.4;cursor:not-allowed}
  .bgm-indicator{display:flex;align-items:center;gap:8px;
    font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:12px}
  .bgm-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s ease-in-out infinite}
  .bgm-dot.off{background:var(--muted);animation:none;opacity:.3}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .status{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);
    text-align:center;margin-top:10px;min-height:16px}
  .status.error{color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div class="station-label">📻 on air</div>
  <h1>AI<span>Radio</span></h1>
  <div class="tagline">エンドレスラジオ — 止まるまで流れ続ける</div>
</div>

<div class="card">
  <div class="section-label">🔑 API キー</div>
  <div id="keySavedBanner" class="key-saved" style="display:none">
    <span>✅ APIキー保存済み</span>
    <button onclick="clearKey()">削除して再入力</button>
  </div>
  <div id="keyInputArea">
    <input type="password" id="apiKey" placeholder="sk-ant-api..." autocomplete="off">
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
      <input type="checkbox" id="saveKey" checked style="width:auto;padding:0;accent-color:var(--accent2)">
      <label for="saveKey" style="font-size:12px;color:var(--muted);cursor:pointer">このデバイスに保存する</label>
    </div>
  </div>
  <hr class="divider">
  <button class="btn-main" id="startBtn" onclick="startRadio()">▶ 放送開始</button>
  <div class="status" id="status"></div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="section-label">📡 オンエア中</div>
  <div class="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="mode-badge mode-loading" id="modeBadge">⏳ 準備中</div>
  <div class="current-theme" id="currentTheme"></div>
  <div class="loading-indicator" id="loadingIndicator">
    <span>台本生成中</span>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="timer-box" id="timerBox"></div>
  <div class="letter-box" id="letterBox">
    <div class="letter-title">📬 次のテーマへのお便り</div>
    <div class="next-theme-label" id="nextThemeLabel"></div>
    <textarea id="letterInput" placeholder="このテーマについて一言どうぞ..."></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendLetter()">送信する</button>
    <div class="letter-sent" id="letterSent">✅ お便りを受け付けました！次の放送でDJが読みます</div>
  </div>
  <div class="bgm-indicator">
    <div class="bgm-dot" id="bgmDot"></div>
    <span id="bgmLabel">BGM 再生中</span>
  </div>
  <button class="btn-stop" onclick="stopRadio()">■ 放送終了</button>
</div>

<script>
// ===== DJ定義 =====
const DJS = {
  a: { name:'ハル',     emoji:'😄', pitch:1.5,  rate:1.1,  desc:'明るくテンション高め。話を広げるのが得意。' },
  b: { name:'ソラ',     emoji:'🤓', pitch:0.8,  rate:0.9,  desc:'冷静で知識豊富。ツッコミ担当。' },
  c: { name:'ナナ',     emoji:'😎', pitch:1.9,  rate:1.15, desc:'トレンド大好きギャル系。話が脱線しがち。テンションが読めない。' },
  d: { name:'ジョージ', emoji:'🧓', pitch:0.6,  rate:0.82, desc:'昭和のおじさんDJ。古いたとえ話が多く若者文化についていけないが人情味がある。' }
};

const BGM_PATTERNS = [
  { notes:[261.6,311.1,369.9,415.3], type:'sine',     interval:1.0, vol:0.03  },
  { notes:[329.6,392.0,440.0,523.2], type:'triangle', interval:0.7, vol:0.025 },
  { notes:[220.0,246.9,277.2,329.6], type:'sine',     interval:1.3, vol:0.035 },
  { notes:[349.2,392.0,440.0,493.8], type:'triangle', interval:0.6, vol:0.025 },
  { notes:[196.0,220.0,261.6,293.6], type:'sine',     interval:1.1, vol:0.03  }
];

// ===== 状態 =====
let isRunning = false;
let usedThemes = [];
let pendingLetter = null;
let timerInterval = null;
let audioCtx = null;
let bgmTimer = null;
let bgmOn = false;
let lastBgmIdx = -1;
let synth = window.speechSynthesis;
let voices = [];

// ===== 音声 =====
function loadVoices() { voices = synth.getVoices().filter(v => v.lang.startsWith('ja')); }
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

// ===== APIキー =====
function loadKey() {
  try {
    if (localStorage.getItem('ai_radio_key')) {
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
}
function clearKey() {
  try { localStorage.removeItem('ai_radio_key'); } catch(e) {}
  document.getElementById('keySavedBanner').style.display = 'none';
  document.getElementById('keyInputArea').style.display = 'block';
}
function getApiKey() {
  try { const s = localStorage.getItem('ai_radio_key'); if (s) return s; } catch(e) {}
  return document.getElementById('apiKey').value.trim();
}

// ===== BGM =====
function pickBgm() {
  let idx;
  do { idx = Math.floor(Math.random() * BGM_PATTERNS.length); } while (idx === lastBgmIdx);
  lastBgmIdx = idx;
  return BGM_PATTERNS[idx];
}

function bgmTick(pattern) {
  if (!bgmOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 8; i++) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = pattern.notes[Math.floor(Math.random() * pattern.notes.length)] * (Math.random() > 0.5 ? 1 : 0.5);
      osc.type = pattern.type;
      const s = now + i * pattern.interval, d = pattern.interval * 1.6;
      gain.gain.setValueAtTime(0, s);
      gain.gain.linearRampToValueAtTime(pattern.vol, s + 0.3);
      gain.gain.linearRampToValueAtTime(0, s + d);
      osc.start(s); osc.onended = () => osc.disconnect(); osc.stop(s + d);
    } catch(e) {}
  }
  bgmTimer = setTimeout(() => bgmTick(pattern), 8 * pattern.interval * 1000 - 300);
}

function startBGM() {
  if (bgmOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmOn = true; setBgmUI(true); bgmTick(pickBgm());
  } catch(e) {}
}

function stopBGM() {
  bgmOn = false; clearTimeout(bgmTimer); bgmTimer = null; setBgmUI(false);
}

function setBgmUI(on) {
  document.getElementById('bgmDot').classList.toggle('off', !on);
  document.getElementById('bgmLabel').textContent = on ? 'BGM 再生中' : 'BGM 停止中';
}

// ===== API =====
async function callAPI(prompt, maxTokens) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:maxTokens, messages:[{ role:'user', content:prompt }] })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'APIエラー'); }
  return (await res.json()).content[0].text.trim();
}

// ===== コンテンツ生成 =====
async function fetchTheme() {
  const useNews = Math.random() < 0.3;
  const exclusion = usedThemes.length > 0
    ? '\n\n【使用済みなので絶対に除外】\n' + usedThemes.map((t, i) => `${i+1}. ${t}`).join('\n') : '';
  const base = useNews
    ? 'あなたはラジオ番組のプロデューサーです。最近の日本や世界のニュース・トレンドを踏まえて、ラジオトークのテーマを1つ考えてください。'
    : 'あなたはラジオ番組のプロデューサーです。リスナーが楽しめる面白いラジオトークのテーマを1つ考えてください。日常・文化・雑学・人生・トレンドなど何でもOK。';
  const theme = await callAPI(base + 'テーマの文章のみ出力（例：○○について）。説明不要。' + exclusion, 100);
  usedThemes.push(theme);
  if (usedThemes.length > 20) usedThemes.shift();
  return theme;
}

async function fetchScript(theme, keyA, keyB, letter) {
  const letterSection = letter
    ? `\n\n【リスナーからのお便り】\nテーマ「${theme}」について届いています。トークの途中で自然に読み上げて返答してください。\n「${letter}」` : '';
  const raw = await callAPI(
    `あなたはラジオ番組の台本作家です。

DJ A「${DJS[keyA].name}」: ${DJS[keyA].desc}
DJ B「${DJS[keyB].name}」: ${DJS[keyB].desc}

テーマ：${theme}${letterSection}

【ルール】
- 40〜50回のやり取り（約15分分）
- 各セリフ1〜3文、挨拶→深掘り→締めの流れ
- キャラクターを活かした自然な会話
- 漢字はすべてひらがなに変換する
- 笑・！・？・（笑）などの記号は使わない

【出力形式のみ】
A:セリフ
B:セリフ
...`, 4096);

  const lines = [];
  raw.split('\n').forEach(line => {
    const t = line.trim();
    if (t.startsWith('A:')) lines.push({ djKey:keyA, text:t.slice(2).trim() });
    else if (t.startsWith('B:')) lines.push({ djKey:keyB, text:t.slice(2).trim() });
  });
  return { theme, lines, keyA, keyB };
}

async function fetchCM() {
  const types = ['食品','アプリ','旅行','健康食品','家電','カフェ','スポーツジム','美容'];
  return await callAPI(
    `架空の${types[Math.floor(Math.random()*types.length)]}のラジオCMを日本語で。商品名は架空。ナレーター1人・約15秒（60文字）。漢字はすべてひらがなに変換する。笑・！・？などの記号は使わない。CM文のみ出力。`, 200
  );
}

// ===== 読み上げ =====
function speak(text, djKey) {
  return new Promise(resolve => {
    const dj = djKey ? DJS[djKey] : { pitch:1.0, rate:1.0 };
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.pitch = dj.pitch; u.rate = dj.rate;
    if (voices.length > 0) u.voice = voices[0];
    u.onend = resolve; u.onerror = resolve;
    synth.speak(u);
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== タイマー =====
function startTimer(seconds) {
  clearInterval(timerInterval);
  const box = document.getElementById('timerBox');
  box.classList.add('visible');
  let remaining = seconds;
  const update = () => {
    if (remaining < 0) { clearInterval(timerInterval); box.textContent = '⏰ お便り締め切りました'; return; }
    const m = Math.floor(remaining / 60), s = remaining % 60;
    box.textContent = `⏰ お便り締め切りまで ${m}:${String(s).padStart(2,'0')}`;
    remaining--;
  };
  update();
  timerInterval = setInterval(update, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerBox').classList.remove('visible');
}

// ===== お便り =====
function showLetterBox(theme) {
  document.getElementById('nextThemeLabel').textContent = '📌 次のテーマ：' + theme;
  document.getElementById('letterInput').value = '';
  document.getElementById('letterSent').style.display = 'none';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('letterBox').classList.add('visible');
}

function hideLetterBox() {
  document.getElementById('letterBox').classList.remove('visible');
}

function sendLetter() {
  const text = document.getElementById('letterInput').value.trim();
  if (!text) return;
  pendingLetter = text;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('letterSent').style.display = 'block';
}

// ===== UI =====
function showLoading(show) {
  document.getElementById('loadingIndicator').classList.toggle('visible', show);
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

function setMode(mode, data) {
  const badge = document.getElementById('modeBadge');
  document.querySelectorAll('.bar').forEach(b => b.classList.remove('active','cm'));
  if (mode === 'talk') {
    badge.textContent = `🎙️ ${DJS[data.keyA].emoji}${DJS[data.keyA].name} × ${DJS[data.keyB].emoji}${DJS[data.keyB].name}`;
    badge.className = 'mode-badge mode-talk';
    document.querySelectorAll('.bar').forEach(b => b.classList.add('active'));
    document.getElementById('currentTheme').textContent = '📌 ' + data.theme;
  } else if (mode === 'cm') {
    badge.textContent = '📺 CM中';
    badge.className = 'mode-badge mode-cm';
    document.querySelectorAll('.bar').forEach(b => b.classList.add('active','cm'));
    document.getElementById('currentTheme').textContent = '次の話題を準備中...';
  } else {
    badge.textContent = '⏳ 準備中';
    badge.className = 'mode-badge mode-loading';
    document.getElementById('currentTheme').textContent = 'AIが台本を書いています...';
  }
}

function pickDJs() {
  return Object.keys(DJS).sort(() => Math.random() - 0.5).slice(0, 2);
}

// ===== メインループ =====
async function radioLoop() {
  setMode('loading', {});
  document.getElementById('currentTheme').textContent = 'まもなく放送開始...';
  showLoading(true);

  await speak('AIラジオへようこそ。ただいま番組を準備中です。しばらくお待ちください。', null);
  await wait(200);

  const [fKeyA, fKeyB] = pickDJs();
  let current = await fetchScript(await fetchTheme(), fKeyA, fKeyB, null);
  showLoading(false);

  while (isRunning) {
    setMode('talk', current);
    startBGM();

    // セリフ数×平均5秒でトーク時間を推定、終了3分前を締め切りに
    const deadlineSec = Math.max(60, current.lines.length * 5 - 180);
    let nextTheme = null;
    let nextPromise = null;

    // タイマーIDをループ外で管理してスコープ問題を解消
    const timers = { theme: null, deadline: null };

    timers.theme = setTimeout(async () => {
      if (!isRunning) return;
      try {
        nextTheme = await fetchTheme();
        showLetterBox(nextTheme);
        startTimer(deadlineSec - 30);
        timers.deadline = setTimeout(() => {
          if (!isRunning) return;
          const [keyA, keyB] = pickDJs();
          const letter = pendingLetter; pendingLetter = null;
          nextPromise = fetchScript(nextTheme, keyA, keyB, letter)
            .catch(() => fetchScript(nextTheme, keyA, keyB, null));
        }, (deadlineSec - 30) * 1000);
      } catch(e) {}
    }, 30000);

    for (let i = 0; i < current.lines.length; i++) {
      if (!isRunning) { clearTimeout(timers.theme); clearTimeout(timers.deadline); return; }
      await speak(current.lines[i].text, current.lines[i].djKey);
      await wait(180);
    }

    clearTimeout(timers.theme); clearTimeout(timers.deadline);
    if (!isRunning) return;

    // CMパート
    stopBGM(); stopTimer(); hideLetterBox();
    setMode('cm', {});

    // 台本がまだなければフォールバック生成
    if (!nextPromise) {
      if (!nextTheme) nextTheme = await fetchTheme();
      const [keyA, keyB] = pickDJs();
      const letter = pendingLetter; pendingLetter = null;
      nextPromise = fetchScript(nextTheme, keyA, keyB, letter)
        .catch(() => fetchScript(nextTheme, keyA, keyB, null));
    }

    const cmText = await fetchCM().catch(() => 'AIラジオをお聴きいただきありがとうございます。');
    await speak('それではCMです。', current.keyA);
    await wait(150);
    await speak(cmText, null);
    await wait(300);
    await speak('以上CMでした。放送に戻ります。', current.keyB);
    await wait(300);
    if (!isRunning) return;

    // 台本を待つ（間に合わなければCM延長）
    let resolved = false;
    nextPromise.then(() => { resolved = true; });
    await wait(300);
    if (!resolved) {
      showLoading(true);
      await speak('ただいま次の番組を準備中です。もうしばらくお待ちください。', null);
    }

    try { current = await nextPromise; } catch(e) { setStatus('エラー: ' + e.message, true); stopRadio(); return; }
    showLoading(false);
  }
}

// ===== 開始・終了 =====
async function startRadio() {
  const apiKey = getApiKey();
  if (!apiKey) { setStatus('APIキーを入力してください', true); return; }
  try {
    if (document.getElementById('saveKey')?.checked) {
      localStorage.setItem('ai_radio_key', apiKey);
      document.getElementById('keySavedBanner').style.display = 'flex';
      document.getElementById('keyInputArea').style.display = 'none';
    }
  } catch(e) {}
  isRunning = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('nowPlaying').classList.add('visible');
  await radioLoop();
}

function stopRadio() {
  isRunning = false;
  usedThemes = []; pendingLetter = null;
  synth.cancel(); stopBGM(); stopTimer(); showLoading(false); hideLetterBox();
  if (audioCtx) { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  document.getElementById('nowPlaying').classList.remove('visible');
  document.getElementById('startBtn').disabled = false;
  setStatus('放送を終了しました', false);
}

// 画面オフ防止
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible')
          try { await navigator.wakeLock.request('screen'); } catch(e) {}
      });
    }
  } catch(e) {}
}

loadKey();
requestWakeLock();
